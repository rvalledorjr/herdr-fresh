# herdr-plugin.toml — manifest for the herdr-fresh plugin.
#
# Runs Fresh (https://getfresh.dev), the terminal IDE, as a real editor (not just a viewer)
# inside a herdr pane. herdr-fresh ships no editor code of its own — only the launcher glue
# that opens Fresh in the right place and keeps a persistent per-workspace editing session.
#
# Verified locally against herdr 0.7.0 and fresh 0.4.1 (see PLAN.md §3, §7 for the full
# research trail). Two load-bearing facts drive this manifest's shape:
#
#   1. `fresh --cmd daemon new <name>` fails with `os error 6` (ENXIO) when spawned without a
#      TTY (confirmed on this host). A daemon can only be created by running `fresh -a <name>`
#      *inside* a real pane PTY — never from a headless action script. So the [[panes]] entry
#      below runs `fresh -a <daemon>` directly as the pane's own process (herdr gives it a PTY),
#      and the open-fresh launcher scripts only ever open/focus that pane — they never try to
#      pre-create the daemon themselves.
#   2. `fresh --cmd daemon open-file <name> <path:line:col>` only works once that daemon already
#      exists (confirmed: it returns "Opened N file(s)" against a live daemon, silently n/a
#      otherwise). So "open file at line" must ensure the workspace's Fresh pane is open first.
#   3. `herdr plugin pane open`'s `--cwd` also governs where the [[panes]] entry's *relative*
#      command (`bash scripts/run-fresh-daemon.sh`) gets resolved from — NOT the plugin's own
#      root. Passing the target repo's cwd there (as early versions of this plugin did) makes
#      bash look for `scripts/run-fresh-daemon.sh` inside that repo, so the pane spawns and
#      immediately exits with no visible error (confirmed: exit code 127 in herdr's server log,
#      the split just flashes and closes). The open-fresh/open-fresh-tab launchers must omit
#      --cwd entirely (letting herdr default it to the plugin root) and rely on
#      run-fresh-daemon.sh's own `cd "$(resolve_cwd)"` (common.sh) to move Fresh into the right
#      directory afterward.
#
# Cross-platform packaging follows the same pattern already proven by the herdr-file-viewer
# plugin installed on this host: platform-gated [[build]]/[[actions]] items, `-windows`-suffixed
# action ids (herdr rejects duplicate ids across platforms), and no Windows [[panes]] entry
# because herdr can't spawn a relative pane command on Windows (CreateProcessW resolves it
# against herdr's own directory, not the plugin's). Windows actions instead resolve this
# plugin's absolute root via `herdr plugin list --json` (see scripts/common.ps1's
# Resolve-PluginRoot) and do the split/tab + pane-run themselves (PLAN.md M5).

id = "herdr-fresh"
name = "herdr-fresh"
version = "0.1.1"
description = "Run Fresh, the terminal IDE, as a file viewer and editor inside a herdr pane."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos", "windows"]

# Build step herdr runs at install time: verify `fresh` is on PATH, auto-installing it via the
# official installer (Unix) / winget (Windows) if missing, else fail with a clear error pointing
# at https://getfresh.dev.
[[build]]
platforms = ["linux", "macos"]
command = ["/bin/sh", "scripts/install.sh"]

[[build]]
platforms = ["windows"]
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/install.ps1"]

# The Fresh pane. herdr performs the split placement on launch; the command runs INSIDE the
# pane's own PTY, which is required for Fresh to create/attach its named daemon (gotcha #1).
[[panes]]
id = "fresh"
title = "Fresh"
placement = "split"
command = ["bash", "scripts/run-fresh-daemon.sh"]

[[actions]]
id = "open-fresh"
platforms = ["linux", "macos"]
title = "Open Fresh (split)"
description = "Open the Fresh editor in a split pane beside the current work."
command = ["bash", "scripts/open-fresh.sh"]

[[actions]]
id = "open-fresh-tab"
platforms = ["linux", "macos"]
title = "Open Fresh (tab)"
description = "Open Fresh in its own tab (switch to it if already open)."
command = ["bash", "scripts/open-fresh-tab.sh"]

[[actions]]
id = "open-file-in-fresh"
platforms = ["linux", "macos"]
title = "Open file in Fresh"
description = "Push path:line:col into the running Fresh daemon for this workspace, opening the pane first if needed."
command = ["bash", "scripts/open-file-in-fresh.sh"]

# Windows variants (PLAN.md M5): -windows-suffixed action ids (herdr rejects duplicate ids
# across platforms even when platform-gated) + absolute-path .ps1 launchers. No Windows
# [[panes]] entry — see file header, gotcha #3.

[[actions]]
id = "open-fresh-windows"
platforms = ["windows"]
title = "Open Fresh (split)"
description = "Open the Fresh editor in a split pane beside the current work."
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/open-fresh.ps1"]

[[actions]]
id = "open-fresh-tab-windows"
platforms = ["windows"]
title = "Open Fresh (tab)"
description = "Open Fresh in its own tab (switch to it if already open)."
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/open-fresh-tab.ps1"]

[[actions]]
id = "open-file-in-fresh-windows"
platforms = ["windows"]
title = "Open file in Fresh"
description = "Push path:line:col into the running Fresh daemon for this workspace, opening the pane first if needed."
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/open-file-in-fresh.ps1"]
